<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — StellarSplit</title>
  <style>
    :root {
      --color-bg: #1a1d27;
      --color-card: #252836;
      --color-accent: #6c63ff;
      --color-text: #e8e8f0;
      --color-text-muted: #9ca3af;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      background: var(--color-card);
      padding: 2.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
    }
    .logo {
      height: 3.5rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
      font-weight: 700;
    }
    p {
      color: var(--color-text-muted);
      font-size: 0.9375rem;
      line-height: 1.5;
      margin: 0 0 1.5rem 0;
    }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #ffffff;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-retry:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/stellarsplit-logo.png" alt="StellarSplit Logo" class="logo">
    <h1>Connection Interrupted</h1>
    <p>StellarSplit is currently offline. Check your internet connection and reload the application ledger.</p>
    <button class="btn-retry" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
